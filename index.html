<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantão RM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f5f7;--surface:#fff;--surface2:#f0f2f5;--border:#dde1e9;--border2:#c4cad6;
  --text:#1a1d26;--text2:#4a5068;--muted:#8a91a8;
  --accent:#1e56c8;--accent-bg:#e8eefb;
  --teal:#0e8a72;--teal-bg:#e4f5f1;
  --amber:#b45309;--amber-bg:#fef3c7;
  --red:#c0392b;--red-bg:#fdecea;
  --green:#166534;--green-bg:#dcfce7;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-badge{background:var(--accent);color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;letter-spacing:.04em}
.brand-name{font-size:15px;font-weight:600;color:var(--text)}
.brand-name span{font-weight:300;color:var(--muted)}
.topbar-controls{display:flex;align-items:center;gap:10px}
select.ctrl-sel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 12px;outline:none;transition:border-color .15s}
select.ctrl-sel:focus{border-color:var(--accent)}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:6px 12px;border-radius:8px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:268px 1fr;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}

/* ADD BUTTONS at top */
.sidebar-add-zone{padding:12px 10px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.add-btn{padding:9px 14px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s;font-weight:500;width:100%}
.add-btn.el:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.add-btn.in:hover:not(:disabled){border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}
.add-btn:disabled{opacity:.38;cursor:not-allowed}
.add-btn .plus{font-size:18px;line-height:1;font-weight:300}
.add-btn .add-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* PATIENT LIST below buttons */
.sidebar-list-head{padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between}
.sidebar-list-head-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}
.sidebar-count{font-family:var(--mono);font-size:11px;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:500}
.patient-list{flex:1;padding:4px 10px 12px;display:flex;flex-direction:column;gap:4px}
.patient-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px}
.patient-item:hover{background:var(--surface2);border-color:var(--border)}
.patient-item.active{background:var(--accent-bg);border-color:rgba(30,86,200,.25)}
.patient-item.active.tipo-in{background:var(--teal-bg);border-color:rgba(14,138,114,.25)}
.patient-item.complete{border-left:3px solid var(--green);padding-left:9px}
.patient-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-el{background:var(--accent)}.dot-in{background:var(--teal)}
.pat-info{flex:1;min-width:0}
.pat-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pat-check{font-size:13px;color:var(--green);flex-shrink:0}
.empty-side{padding:20px 16px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}

/* MAIN */
.main{padding:24px 28px 100px;overflow-y:auto}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:10px;color:var(--muted)}
.empty-main svg{opacity:.2;margin-bottom:8px}
.empty-main p{font-size:14px}

/* FORM CARD */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.form-card-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.fch-left{display:flex;align-items:center;gap:10px}
.type-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.badge-el{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(30,86,200,.2)}
.badge-in{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(14,138,114,.2)}
.form-card-title{font-size:15px;font-weight:600}
.del-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.form-body{padding:20px}

/* FIELDS */
.form-row{display:grid;gap:14px;margin-bottom:20px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.s2{grid-column:span 2}.sf{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}
.field input,.field select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,86,200,.08)}
.field input[type="time"]{font-family:var(--mono);font-size:14px;letter-spacing:.02em}

/* TIME WRAP */
.tw{position:relative}.tw input{padding-right:34px}
.tw-dot{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background .2s}
.tw-dot.on{background:var(--green)}

/* SECTION */
.sec-block{margin-bottom:24px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* SKELETON SELECTOR */
.skel-wrap{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.skel-svg-wrap{position:relative;user-select:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.skel-svg-wrap svg{width:100%;height:auto;display:block}

.skel-zone{fill:transparent;stroke:transparent;cursor:pointer;transition:fill .15s,stroke .15s}
.skel-zone:hover{fill:rgba(30,86,200,.13);stroke:rgba(30,86,200,.3);stroke-width:1.5}
.skel-zone.active{fill:rgba(30,86,200,.22);stroke:var(--accent);stroke-width:1.5}
.skel-zone.has-sel{fill:rgba(30,86,200,.07);stroke:var(--accent);stroke-width:1}

.skel-label{font-size:9px;fill:var(--muted);font-family:var(--sans);pointer-events:none;font-weight:500;letter-spacing:.03em}
.skel-label.active-lbl{fill:var(--accent)}

/* EXAM PANEL */
.exam-panel{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:220px;max-height:460px;overflow-y:auto}
.exam-panel-region{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.exam-hint{font-size:12px;color:var(--muted);padding:50px 20px;text-align:center;line-height:1.7}
.exam-list{display:flex;flex-direction:column;gap:4px}
.exam-chip{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px;font-weight:400}
.exam-chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.exam-chip.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);font-weight:500}
.exam-chip::before{content:'';width:12px;display:inline-block;font-size:11px;flex-shrink:0}
.exam-chip.selected::before{content:'✓'}

/* SELECTED TAGS */
.sel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.sel-tag{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(30,86,200,.2);font-size:11px;font-weight:500;padding:3px 9px;border-radius:12px;display:flex;align-items:center;gap:5px}
.sel-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.6}
.sel-tag button:hover{opacity:1}

/* TIMELINE */
.tl-bar{margin-top:4px}
.tl-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.tl-track{display:flex;align-items:flex-start;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;gap:0;overflow-x:auto}
.tl-step{display:flex;align-items:center;flex:1;min-width:70px}
.tl-inner{display:flex;flex-direction:column;align-items:center;gap:4px}
.tl-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--border2);background:var(--surface);font-family:var(--mono);font-size:10px;color:var(--muted);transition:all .2s}
.tl-dot.done{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.tl-dot.next{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.tl-ln{flex:1;height:2px;background:var(--border);min-width:16px;transition:background .2s}
.tl-ln.done{background:var(--green)}
.tl-lbl{font-size:10px;color:var(--muted);text-align:center;white-space:nowrap}
.tl-tm{font-family:var(--mono);font-size:10px;color:var(--accent);text-align:center}

/* STATUS BAR */
.status-bar{background:var(--surface2);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.status-bar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.prog-chip{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.p-ok{background:var(--green-bg);color:var(--green)}
.p-warn{background:var(--amber-bg);color:var(--amber)}
.p-empty{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.save-indicator{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATS BAR */
.stats-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.stats-left{display:flex;gap:24px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-v{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text)}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stats-right{display:flex;align-items:center;gap:10px}
.turno-badge{font-family:var(--mono);font-size:12px;background:var(--accent-bg);color:var(--accent);padding:6px 14px;border-radius:8px;font-weight:500}
.sending-info{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sending-spin{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;display:none;animation:spin .7s linear infinite}
.sending-spin.active{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:68px;right:20px;z-index:999;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh-md);transform:translateY(12px);opacity:0;transition:all .2s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green-bg);border:1px solid rgba(22,101,52,.2);color:var(--green)}
.toast.err{background:var(--red-bg);border:1px solid rgba(192,57,43,.2);color:var(--red)}
.toast.inf{background:var(--accent-bg);border:1px solid rgba(30,86,200,.2);color:var(--accent)}

.exam-livre-block{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.exam-livre-toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;user-select:none;width:100%}
.exam-livre-toggle:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-bg)}
.exam-livre-toggle.active{border-color:rgba(180,83,9,.35);color:var(--amber);background:var(--amber-bg)}
.exam-livre-toggle input[type=checkbox]{width:15px;height:15px;accent-color:var(--amber);cursor:pointer;flex-shrink:0}
.exam-livre-area{margin-top:8px;display:none}
.exam-livre-area.show{display:block}
.exam-livre-area textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;resize:vertical;min-height:72px;transition:border-color .15s;line-height:1.5}
.exam-livre-area textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(180,83,9,.08)}
.exam-livre-area textarea::placeholder{color:var(--muted)}
.exam-livre-area .livre-hint{font-size:11px;color:var(--muted);margin-top:4px}
.cfg-warn{background:var(--amber-bg);border:1px solid rgba(180,83,9,.2);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--amber);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.cfg-warn code{background:rgba(180,83,9,.1);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:11px}
</style>
</head>

<script>

const OPERATORS = ["Ana Cristina Simões","Felipe Bezerra","Jorge Martins","Vera Maria Mascarenhas"];
const EXAMS = {
  cabeca:{label:"Cabeça e Pescoço",exams:["RM CRANIO","RM CRANIO COM ESPECTROSCOPIA","RM CRANIO COM NEURONAVEGACAO","RM CRANIO COM PERFUSAO","RM CRANIO COM FLUXO LIQUORICO","RM HIPOFISE","RM ORBITA","RM CAVIDADE NASAL","RM ARTICULACAO TEMPORO MANDIBULAR","RM MASTOIDES","RM PESCOCO","ANGIO RM ARTERIAL CRANIO","ANGIO RM VENOSA CRANIO","ANGIO RM ARTERIAL PESCOCO","ANGIO RM VENOSA PESCOCO"]},
  torax:{label:"Tórax",exams:["RM TORAX","RM ESTERNO","RM MAMAS","RM CORACAO","RM CORACAO COM PERFUSAO E ESTRESSE","ANGIO RM ARTERIAL PULMONAR","ANGIO RM VENOSA PULMONAR","ANGIO RM AORTA TORACICA"]},
  abdome:{label:"Abdome e Pelve",exams:["RM ABDOME SUPERIOR","COLANGIO-RESSONANCIA","URORESSONANCIA","RM PELVIS","RM PROSTATA","RM BOLSA ESCROTAL","DEFECO RM","ANGIO RM AORTA ABDOMINAL","ANGIO RM ARTERIAL ABDOME SUPERIOR","ANGIO RM VENOSA ABDOME SUPERIOR","ANGIO RM ARTERIAL PELVE","ANGIO RM VENOSA PELVE"]},
  coluna:{label:"Coluna",exams:["RM COLUNA CERVICAL","RM COLUNA TORACICA","RM COLUNA LOMBO-SACRA"]},
  bracos:{label:"Braços",exams:["RM OMBRO DIREITO","RM OMBRO ESQUERDO","RM PLEXO BRAQUIAL DIREITO","RM PLEXO BRAQUIAL ESQUERDO","RM BRACO DIREITO","RM BRACO ESQUERDO","RM COTOVELO DIREITO","RM COTOVELO ESQUERDO","RM ANTEBRACO DIREITO","RM ANTEBRACO ESQUERDO","RM PUNHO DIREITO","RM PUNHO ESQUERDO","RM MAO DIREITA","RM MAO ESQUERDA"]},
  pernas:{label:"Bacia e Pernas",exams:["RM BACIA","RM ARTICULACAO SACRO-ILIACAS","RM COXO-FEMORAL DIREITA","RM COXO-FEMORAL ESQUERDA","RM COXA DIREITA","RM COXA ESQUERDA","RM JOELHO DIREITO","RM JOELHO ESQUERDO","RM PERNA DIREITA","RM PERNA ESQUERDA","RM TORNOZELO DIREITO","RM TORNOZELO ESQUERDO","RM PE DIREITO","RM PE ESQUERDO"]}
};
</script>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <span class="brand-badge">RM</span>
    <span class="brand-name">Passagem de Plantão <span>/ Ressonância Magnética</span></span>
  </div>
  <div class="topbar-controls">
    <select class="ctrl-sel" id="turno">
      <option value="">Selecione o turno</option>
      <option value="M">Turno Manhã</option>
      <option value="T">Turno Tarde</option>
      <option value="N">Turno Noite</option>
    </select>
    <select class="ctrl-sel" id="operador" style="min-width:200px">
      <option value="">Selecione o operador</option>
    </select>
    <div class="date-chip" id="date-chip"></div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- ADD BUTTONS at top -->
    <div class="sidebar-add-zone">
      <button class="add-btn el" id="add-el-btn" onclick="addPatient('eletivo')" disabled>
        <div class="add-dot" style="background:var(--accent)"></div>
        <span class="plus">+</span> Paciente eletivo
      </button>
      <button class="add-btn in" id="add-in-btn" onclick="addPatient('internado')" disabled>
        <div class="add-dot" style="background:var(--teal)"></div>
        <span class="plus">+</span> Paciente internado
      </button>
    </div>
    <!-- PATIENT LIST below -->
    <div class="sidebar-list-head">
      <span class="sidebar-list-head-title">Pacientes do turno</span>
      <span class="sidebar-count" id="pat-count">0</span>
    </div>
    <div class="patient-list" id="patient-list">
      <div class="empty-side">Selecione operador e turno,<br>depois adicione pacientes acima.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-left">
    <div class="stat"><span class="stat-v" id="s-total">0</span><span class="stat-l">pacientes</span></div>
    <div class="stat"><span class="stat-v" id="s-el">0</span><span class="stat-l">eletivos</span></div>
    <div class="stat"><span class="stat-v" id="s-in">0</span><span class="stat-l">internados</span></div>
  </div>
  <div class="stats-right">
    <div class="sending-info">
      <div class="sending-spin" id="spin"></div>
      <span id="send-label">Envio automático ativo</span>
    </div>
    <div class="turno-badge" id="turno-badge">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state={patients:[],counter:0,activeId:null,activeZone:null};
let sendTimers={};

function init(){
  const d=new Date();
  document.getElementById('date-chip').textContent=d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  const opSel=document.getElementById('operador');
  OPERATORS.forEach(op=>{const o=document.createElement('option');o.value=o.textContent=op;opSel.appendChild(o)});
  document.getElementById('turno').addEventListener('change',updateBadge);
  document.getElementById('operador').addEventListener('change',updateBadge);
  updateBadge();renderMain();
}

function updateBadge(){
  const t=document.getElementById('turno').value;
  const labels={M:'Manhã',T:'Tarde',N:'Noite'};
  document.getElementById('turno-badge').textContent=t?labels[t]:'—';
  checkAddBtns();
}

function checkAddBtns(){
  const op=document.getElementById('operador').value;
  const tu=document.getElementById('turno').value;
  const hasIncomp=state.patients.some(p=>!isComplete(p));
  const ok=op&&tu&&!hasIncomp;
  document.getElementById('add-el-btn').disabled=!ok;
  document.getElementById('add-in-btn').disabled=!ok;
}

function isComplete(p){
  const hasSegs=p.segmentos.length>0||(p.examLivreAtivo&&p.examLivre.length>0);
  if(!p.iniciais||!p.atendimento||!hasSegs||!p.agendado||!p.inicio||!p.fim)return false;
  if(p.tipo==='eletivo'&&(!p.totem||!p.cadastro))return false;
  return true;
}

function addPatient(tipo){
  const id=++state.counter;
  state.patients.push({id,tipo,iniciais:'',atendimento:'',segmentos:[],examLivre:'',examLivreAtivo:false,unidade:'',unidadeOutro:false,unidadeLivre:'',agendado:'',totem:'',cadastro:'',inicio:'',fim:'',anestesia:false,sent:false,sentSnapshot:null,sending:false});
  state.activeId=id;state.activeZone=null;
  renderSidebar();renderMain();updateStats();checkAddBtns();
}

function deletePatient(id){
  state.patients=state.patients.filter(p=>p.id!==id);
  if(state.activeId===id)state.activeId=state.patients.length?state.patients[state.patients.length-1].id:null;
  renderSidebar();renderMain();updateStats();checkAddBtns();
}

function setActive(id){
  state.activeId=id;state.activeZone=null;
  renderSidebar();renderMain();
}

function renderSidebar(){
  const list=document.getElementById('patient-list');
  document.getElementById('pat-count').textContent=state.patients.length;
  if(!state.patients.length){
    list.innerHTML='<div class="empty-side">Nenhum paciente registrado ainda.</div>';return;
  }
  list.innerHTML=state.patients.map(p=>{
    const comp=isComplete(p);
    const sentBadge=p.sent?'<span style="color:var(--green);font-size:11px">✓ enviado</span>':'';
    return `<div class="patient-item ${p.id===state.activeId?'active':''} ${p.id===state.activeId&&p.tipo==='internado'?'tipo-in':''} ${comp?'complete':''}" onclick="setActive(${p.id})">
      <div class="patient-dot ${p.tipo==='eletivo'?'dot-el':'dot-in'}"></div>
      <div class="pat-info">
        <div class="pat-name">${p.iniciais||'Novo paciente'}</div>
        <div class="pat-sub">${p.tipo==='eletivo'?'Eletivo':'Internado'}${p.atendimento?' · '+p.atendimento:''}${sentBadge?'<br>'+sentBadge:''}</div>
      </div>
      ${comp?'<span class="pat-check">✓</span>':''}
    </div>`;
  }).join('');
}

function renderMain(){
  const area=document.getElementById('main');
  const p=state.patients.find(x=>x.id===state.activeId);

}

function getZoneCls(zone,p){
  const has=p.segmentos.some(s=>EXAMS[zone]&&EXAMS[zone].exams.includes(s));
  return state.activeZone===zone?'active':has?'has-sel':'';
}

function highlightZone(zone){
  document.querySelectorAll('.skel-zone').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll(`[id^="z-${zone}"]`).forEach(el=>el.classList.add('active'));
  const lbl=document.getElementById('lbl-hint');
  if(lbl){lbl.textContent=EXAMS[zone]?EXAMS[zone].label:'';lbl.classList.toggle('active-lbl',true)}
}

function buildExamLivre(p){
  return`<div class="exam-livre-block">
    <label class="exam-livre-toggle ${p.examLivreAtivo?'active':''}" id="livre-lbl-${p.id}">
      <input type="checkbox" ${p.examLivreAtivo?'checked':''} onchange="toggleExamLivre(${p.id},this.checked)">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0"><circle cx="7" cy="7" r="6"/><line x1="7" y1="4" x2="7" y2="10"/><line x1="4" y1="7" x2="10" y2="7"/></svg>
      Exame não encontrado na lista
    </label>
    <div class="exam-livre-area ${p.examLivreAtivo?'show':''}" id="livre-area-${p.id}">
      <textarea id="livre-txt-${p.id}" placeholder="Digite o nome completo do exame..." oninput="updExamLivre(${p.id},this.value)">${p.examLivre}</textarea>
      <div class="livre-hint">Este texto será enviado como segmento do exame para a planilha.</div>
    </div>
  </div>`;
}

function toggleExamLivre(id,checked){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.examLivreAtivo=checked;
  if(!checked)p.examLivre='';
  // Update UI without full re-render
  const lbl=document.getElementById(`livre-lbl-${id}`);
  const area=document.getElementById(`livre-area-${id}`);
  if(lbl)lbl.classList.toggle('active',checked);
  if(area)area.classList.toggle('show',checked);
  if(!checked){const txt=document.getElementById(`livre-txt-${id}`);if(txt)txt.value='';}
  refreshStatus(p);scheduleAutoSend(p);
}

function updExamLivre(id,val){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.examLivre=val.trim();
  refreshStatus(p);scheduleAutoSend(p);
}

function buildExamList(p,zone){
  if(!EXAMS[zone])return'';
  return`<div class="exam-panel-region"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="var(--accent)"/></svg>${EXAMS[zone].label}</div>
  <div class="exam-list">${EXAMS[zone].exams.map(ex=>`<div class="exam-chip ${p.segmentos.includes(ex)?'selected':''}" onclick="toggleExam(${p.id},'${ex.replace(/'/g,"\\'")}','${zone}')">${ex}</div>`).join('')}</div>`;
}

function selectZone(zone){
  state.activeZone=zone;
  const p=state.patients.find(x=>x.id===state.activeId);
  if(!p)return;
  highlightZone(zone);
  const panel=document.getElementById(`exam-panel-${p.id}`);
  if(panel){
    const tags=p.segmentos.length?`<div class="sel-tags" id="sel-tags-${p.id}">${p.segmentos.map(s=>`<span class="sel-tag">${s}<button onclick="removeSeg(${p.id},'${s.replace(/'/g,"\\'")}')">×</button></span>`).join('')}</div>`:'';
    panel.innerHTML=buildExamList(p,zone)+tags+buildExamLivre(p);
  }
}

function toggleExam(id,exam,zone){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  const idx=p.segmentos.indexOf(exam);
  if(idx===-1)p.segmentos.push(exam);else p.segmentos.splice(idx,1);
  selectZone(zone);refreshStatus(p);
  scheduleAutoSend(p);
}

function removeSeg(id,exam){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.segmentos=p.segmentos.filter(s=>s!==exam);
  if(state.activeZone)selectZone(state.activeZone);
  refreshStatus(p);checkAddBtns();
  scheduleAutoSend(p);
}

function upd(id,field,val){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p[field]=val;
  if(field==='iniciais'){const t=document.querySelector('.form-card-title');if(t)t.textContent=val||'Novo paciente';renderSidebar()}
  if(field==='atendimento')renderSidebar();
  refreshStatus(p);refreshTl(p);scheduleAutoSend(p);
}

function updUnidade(id,val){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  if(val==='__outro__'){
    p.unidadeOutro=true;
    p.unidade='';
  } else {
    p.unidadeOutro=false;
    p.unidadeLivre='';
    p.unidade=val;
  }
  // Re-render the identification block to show/hide free-text input
  renderMain();
  scheduleAutoSend(p);
}

function updUnidadeLivre(id,val){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.unidadeLivre=val.trim();
  p.unidade=val.trim();
  refreshStatus(p);scheduleAutoSend(p);
}

function updAnestesia(id,checked){
  const p=state.patients.find(x=>x.id===id);if(!p)return;
  p.anestesia=checked;
  refreshStatus(p);scheduleAutoSend(p);
}

function updAnestLabel(id,checked){
  const lbl=document.getElementById(`anest-lbl-${id}`);
  if(!lbl)return;
  lbl.style.borderColor=checked?'rgba(192,57,43,.35)':'var(--border)';
  lbl.style.background=checked?'var(--red-bg)':'var(--surface2)';
  const span=lbl.querySelector('span');
  if(span)span.style.color=checked?'var(--red)':'var(--text2)';
  // update/remove badge
  let badge=lbl.querySelector('.anest-badge');
  if(checked&&!badge){
    badge=document.createElement('span');
    badge.className='anest-badge';
    badge.style.cssText='font-family:var(--mono);font-size:10px;background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);padding:2px 8px;border-radius:10px;font-weight:500';
    badge.textContent='SIM';lbl.appendChild(badge);
  } else if(!checked&&badge){badge.remove();}
}

function dotUpd(input){
  const dot=input.nextElementSibling;
  if(dot)dot.classList.toggle('on',!!input.value);
}

function refreshStatus(p){
  const bar=document.getElementById(`sbar-${p.id}`);if(!bar)return;
  const c=calcComp(p);const cls=c===100?'p-ok':c>0?'p-warn':'p-empty';
  bar.innerHTML=`<span class="prog-chip ${cls}">${c}% preenchido</span>${isComplete(p)?'<span class="prog-chip p-ok">✓ Pronto para envio</span>':''}`;
  checkAddBtns();
}

function refreshTl(p){
  const tl=document.querySelector('.tl-bar');if(tl)tl.outerHTML=buildTl(p);
}

function calcComp(p){
  const fields=p.tipo==='eletivo'?['iniciais','atendimento','agendado','totem','cadastro','inicio','fim']:['iniciais','atendimento','agendado','inicio','fim'];
  const filled=fields.filter(f=>p[f]).length;
  const hasSegs=(p.segmentos.length>0||(p.examLivreAtivo&&p.examLivre.length>0))?1:0;
  return Math.round(((filled+hasSegs)/(fields.length+1))*100);
}

function buildTl(p){
  const steps=p.tipo==='eletivo'
    ?[{l:'Agendado',v:p.agendado},{l:'Totem',v:p.totem},{l:'Cadastro',v:p.cadastro},{l:'Início',v:p.inicio},{l:'Fim',v:p.fim}]
    :[{l:'Agendado',v:p.agendado},{l:'Início',v:p.inicio},{l:'Fim',v:p.fim}];
  const inner=steps.map((s,i)=>{
    const done=!!s.v;const next=!done&&(i===0||steps[i-1].v);
    const dc=done?'done':next?'next':'';const lc=done&&i<steps.length-1?'done':'';
    return`<div class="tl-step"><div class="tl-inner"><div class="tl-dot ${dc}">${done?'✓':i+1}</div><div class="tl-lbl">${s.l}</div>${s.v?`<div class="tl-tm">${s.v}</div>`:''}</div>${i<steps.length-1?`<div class="tl-ln ${lc}"></div>`:''}</div>`;
  }).join('');
  return`<div class="tl-bar"><div class="tl-title">Linha do tempo</div><div class="tl-track">${inner}</div></div>`;
}

function updateStats(){
  document.getElementById('s-total').textContent=state.patients.length;
  document.getElementById('s-el').textContent=state.patients.filter(p=>p.tipo==='eletivo').length;
  document.getElementById('s-in').textContent=state.patients.filter(p=>p.tipo==='internado').length;
}

function patientSnapshot(p){
  return JSON.stringify([p.tipo,p.iniciais,p.atendimento,p.unidade,p.unidadeLivre,p.segmentos.slice().sort(),p.examLivreAtivo,p.examLivre,p.anestesia,p.agendado,p.totem,p.cadastro,p.inicio,p.fim]);
}

function scheduleAutoSend(p){
  if(!isComplete(p))return;
  // If already sending, don't queue another — the post-send check will handle re-send if needed
  if(p.sending)return;
  clearTimeout(sendTimers[p.id]);
  sendTimers[p.id]=setTimeout(()=>autoSend(p),900);
}

async function autoSend(p){
  if(p.sending)return; // strict guard: only one in-flight request per patient at a time
  const op=document.getElementById('operador').value;
  const tu=document.getElementById('turno').value;
  if(!op||!tu){toast('Selecione operador e turno antes de enviar.','inf');return}
  if(!isComplete(p))return;

  const currentSnap=patientSnapshot(p);
  // Skip if data hasn't changed since last successful send
  if(p.sent && p.sentSnapshot===currentSnap)return;

  p.sending=true;
  const spin=document.getElementById('spin');
  const lbl=document.getElementById('send-label');
  spin.classList.add('active');
  lbl.textContent=p.sent?'Atualizando...':'Enviando...';

  const isUpdate=p.sent;
  const payload={
    data:new Date().toLocaleDateString('pt-BR'),
    hora_envio:new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    turno:tu,operador:op,
    acao: isUpdate ? 'update' : 'insert',
    id_paciente: p.id,
    pacientes:[{tipo:p.tipo,iniciais:p.iniciais,atendimento:p.atendimento,unidade:p.unidade,segmentos:p.examLivreAtivo&&p.examLivre?p.examLivre:p.segmentos.join(' | '),anestesia:p.tipo==='internado'?(p.anestesia?'Sim':'Não'):'',agendado:p.agendado,totem:p.totem,cadastro:p.cadastro,inicio:p.inicio,fim:p.fim}]
  };

  if(APPS_SCRIPT_URL==="COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT"){
    await new Promise(r=>setTimeout(r,700));
    finishSend(p,spin,lbl,currentSnap,isUpdate);
    return;
  }
  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    finishSend(p,spin,lbl,currentSnap,isUpdate);
  }catch(e){
    p.sending=false;
    spin.classList.remove('active');lbl.textContent='Envio automático ativo';
    toast('Erro ao enviar — verifique a conexão.','err');
  }
}

function finishSend(p,spin,lbl,snap,wasUpdate){
  p.sent=true;
  p.sending=false;
  p.sentSnapshot=snap;
  spin.classList.remove('active');lbl.textContent='Envio automático ativo';
  renderSidebar();checkAddBtns();
  toast(`${wasUpdate?'↻ Atualizado':'✓ Registrado'}: ${p.iniciais||'Paciente'}`, 'ok');

  // If data changed again while we were sending, re-queue
  const currentSnap=patientSnapshot(p);
  if(currentSnap!==snap && isComplete(p)){
    scheduleAutoSend(p);
  }
}

let toastTimer;
function toast(msg,type='inf',dur=3500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

init();
</script>
</body>
</html>
