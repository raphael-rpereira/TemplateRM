<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Plantão RM · Gestão de Tempos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surf:#fff;--surf2:#f0f2f5;--brd:#dde1e9;--brd2:#c4cad6;--txt:#1a1d26;--txt2:#4a5068;--muted:#8a91a8;--acc:#1e56c8;--acc-bg:#e8eefb;--teal:#0e8a72;--teal-bg:#e4f5f1;--amb:#b45309;--amb-bg:#fef3c7;--red:#c0392b;--red-bg:#fdecea;--grn:#166534;--grn-bg:#dcfce7;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.1);--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh}
/* TOPBAR */
.topbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.brand{display:flex;align-items:center;gap:10px}
.brand-badge{background:var(--acc);color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;letter-spacing:.04em}
.brand-name{font-size:15px;font-weight:600}
.brand-name span{font-weight:300;color:var(--muted)}
.top-ctrls{display:flex;align-items:center;gap:10px}
.ctrl-sel{background:var(--surf2);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:7px 12px;outline:none}
.ctrl-sel:focus{border-color:var(--acc)}
.date-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surf2);border:1px solid var(--brd);padding:6px 12px;border-radius:8px}
/* LAYOUT */
.layout{display:grid;grid-template-columns:268px 1fr;min-height:calc(100vh - 54px)}
/* SIDEBAR */
.sidebar{background:var(--surf);border-right:1px solid var(--brd);display:grid;grid-template-rows:auto auto 1fr;position:sticky;top:54px;height:calc(100vh - 54px);overflow:hidden}
.add-zone{padding:12px 10px;border-bottom:1px solid var(--brd);display:flex;flex-direction:column;gap:6px}
.add-btn{padding:9px 14px;border-radius:8px;border:1px dashed var(--brd2);background:transparent;color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s;font-weight:500;width:100%}
.add-btn.el:hover:not(:disabled){border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.add-btn.in:hover:not(:disabled){border-color:var(--teal);color:var(--teal);background:var(--teal-bg)}
.add-btn:disabled{opacity:.38;cursor:not-allowed}
.add-btn .plus{font-size:18px;line-height:1;font-weight:300}
.add-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.list-head{padding:10px 16px 4px;display:flex;align-items:center;justify-content:space-between}
.list-head-title{font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.pat-count{font-family:var(--mono);font-size:11px;background:var(--acc-bg);color:var(--acc);padding:2px 8px;border-radius:10px;font-weight:500}
.pat-list{min-height:0;padding:4px 10px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.pat-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px}
.pat-item:hover{background:var(--surf2);border-color:var(--brd)}
.pat-item.active{background:var(--acc-bg);border-color:rgba(30,86,200,.25)}
.pat-item.active.int{background:var(--teal-bg);border-color:rgba(14,138,114,.25)}
.pat-item.done{border-left:3px solid var(--grn);padding-left:9px}
.pat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-el{background:var(--acc)}.dot-in{background:var(--teal)}
.pat-info{flex:1;min-width:0}
.pat-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pat-tick{font-size:13px;color:var(--grn);flex-shrink:0}
.empty-side{padding:20px 16px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}

.end-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:12px;font-family:var(--sans);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;white-space:nowrap}
.end-btn:hover:not(:disabled){background:#1644a8}
.end-btn:disabled{background:var(--brd2);color:var(--muted);cursor:not-allowed}
/* MAIN */
.main{padding:24px 28px 100px;overflow-y:auto}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:10px;color:var(--muted)}
.empty-main svg{opacity:.2;margin-bottom:8px}
/* FORM */
.form-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.card-head{padding:15px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:var(--surf2)}
.card-head-left{display:flex;align-items:center;gap:10px}
.type-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.badge-el{background:var(--acc-bg);color:var(--acc);border:1px solid rgba(30,86,200,.2)}
.badge-in{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(14,138,114,.2)}
.card-title{font-size:15px;font-weight:600}
.del-btn{background:none;border:1px solid var(--brd);border-radius:6px;color:var(--muted);padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.card-body{padding:20px}
.sec-block{margin-bottom:24px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--brd)}
.row{display:grid;gap:14px;margin-bottom:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
.s2{grid-column:span 2}.sf{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.04em;text-transform:uppercase}
.field input,.field select{background:var(--surf);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(30,86,200,.08)}
.field input[type=time]{font-family:var(--mono);font-size:14px}
.tw{position:relative}.tw input{padding-right:34px}
.tw-dot{position:absolute;right:11px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--brd2);transition:background .2s}
.tw-dot.on{background:var(--grn)}
/* SKELETON */
.skel-wrap{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start}
.skel-svg-box{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:12px}
.skel-svg-box svg{width:100%;height:auto;display:block}
.sz{fill:transparent;stroke:transparent;cursor:pointer;transition:fill .15s,stroke .15s}
.sz:hover{fill:rgba(30,86,200,.13);stroke:rgba(30,86,200,.3);stroke-width:1.5}
.sz.active{fill:rgba(30,86,200,.22);stroke:var(--acc);stroke-width:1.5}
.sz.has-sel{fill:rgba(30,86,200,.07);stroke:var(--acc);stroke-width:1}
.exam-panel{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px 16px;min-height:220px;max-height:460px;overflow-y:auto}
.exam-region{font-size:12px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.exam-hint{font-size:12px;color:var(--muted);padding:50px 20px;text-align:center;line-height:1.7}
.exam-list{display:flex;flex-direction:column;gap:4px}
.exam-chip{padding:7px 12px;border-radius:6px;border:1px solid var(--brd);background:var(--surf);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.exam-chip::before{content:'';width:12px;font-size:11px;flex-shrink:0}
.exam-chip:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-bg)}
.exam-chip.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-bg);font-weight:500}
.exam-chip.sel::before{content:'✓'}
.sel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.sel-tag{background:var(--acc-bg);color:var(--acc);border:1px solid rgba(30,86,200,.2);font-size:11px;font-weight:500;padding:3px 9px;border-radius:12px;display:flex;align-items:center;gap:5px}
.sel-tag button{background:none;border:none;color:var(--acc);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.6}
.sel-tag button:hover{opacity:1}
/* EXAM LIVRE */
.livre-block{margin-top:12px;padding-top:12px;border-top:1px solid var(--brd)}
.livre-toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--surf);font-size:12px;font-weight:500;color:var(--txt2);transition:all .15s;user-select:none;width:100%}
.livre-toggle:hover{border-color:var(--amb);color:var(--amb);background:var(--amb-bg)}
.livre-toggle.on{border-color:rgba(180,83,9,.35);color:var(--amb);background:var(--amb-bg)}
.livre-toggle input[type=checkbox]{width:15px;height:15px;accent-color:var(--amb);cursor:pointer;flex-shrink:0}
.livre-area{margin-top:8px;display:none}
.livre-area.show{display:block}
.livre-area textarea{width:100%;background:var(--surf);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:13px;padding:10px 12px;outline:none;resize:vertical;min-height:72px;transition:border-color .15s}
.livre-area textarea:focus{border-color:var(--amb);box-shadow:0 0 0 3px rgba(180,83,9,.08)}
.livre-hint{font-size:11px;color:var(--muted);margin-top:4px}
/* ANESTESIA */
.anest-label{display:inline-flex;align-items:center;gap:10px;cursor:pointer;padding:11px 16px;border-radius:8px;border:1px solid var(--brd);background:var(--surf2);transition:all .15s;user-select:none;font-size:13px;font-weight:500;color:var(--txt2)}
.anest-label.on{border-color:rgba(192,57,43,.35);background:var(--red-bg);color:var(--red)}
.anest-label input[type=checkbox]{width:17px;height:17px;accent-color:var(--red);cursor:pointer;flex-shrink:0}
/* TIMELINE */
.tl-bar{margin-top:4px}
.tl-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.tl-track{display:flex;align-items:flex-start;padding:14px 16px;background:var(--surf2);border:1px solid var(--brd);border-radius:10px;gap:0;overflow-x:auto}
.tl-step{display:flex;align-items:center;flex:1;min-width:70px}
.tl-inner{display:flex;flex-direction:column;align-items:center;gap:4px}
.tl-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--brd2);background:var(--surf);font-family:var(--mono);font-size:10px;color:var(--muted);transition:all .2s}
.tl-dot.done{border-color:var(--grn);background:var(--grn-bg);color:var(--grn)}
.tl-dot.next{border-color:var(--acc);background:var(--acc-bg);color:var(--acc)}
.tl-ln{flex:1;height:2px;background:var(--brd);min-width:16px;transition:background .2s}
.tl-ln.done{background:var(--grn)}
.tl-lbl{font-size:10px;color:var(--muted);text-align:center;white-space:nowrap}
.tl-tm{font-family:var(--mono);font-size:10px;color:var(--acc);text-align:center}
/* STATUS BAR */
.status-bar{background:var(--surf2);border-top:1px solid var(--brd);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.prog-chip{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.p-ok{background:var(--grn-bg);color:var(--grn)}.p-warn{background:var(--amb-bg);color:var(--amb)}.p-empty{background:var(--surf);color:var(--muted);border:1px solid var(--brd)}
.auto-send-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.send-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* STATS BAR */
.stats-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surf);border-top:1px solid var(--brd);padding:10px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.stats-left{display:flex;gap:24px}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-v{font-family:var(--mono);font-size:20px;font-weight:500}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.stats-right{display:flex;align-items:center;gap:10px}
.turno-badge{font-family:var(--mono);font-size:12px;background:var(--acc-bg);color:var(--acc);padding:6px 14px;border-radius:8px;font-weight:500}
.spin-wrap{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.spin{width:12px;height:12px;border:2px solid var(--brd2);border-top-color:var(--acc);border-radius:50%;display:none;animation:spin .7s linear infinite}
.spin.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:68px;right:20px;z-index:999;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh2);transform:translateY(12px);opacity:0;transition:all .2s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--grn-bg);border:1px solid rgba(22,101,52,.2);color:var(--grn)}
.toast.err{background:var(--red-bg);border:1px solid rgba(192,57,43,.2);color:var(--red)}
.toast.inf{background:var(--acc-bg);border:1px solid rgba(30,86,200,.2);color:var(--acc)}
/* CFG WARN */
.cfg-warn{background:var(--amb-bg);border:1px solid rgba(180,83,9,.2);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;color:var(--amb);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.cfg-warn code{background:rgba(180,83,9,.1);padding:1px 5px;border-radius:3px;font-family:var(--mono);font-size:11px}
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <span class="brand-badge">RM</span>
    <span class="brand-name">Plantão de Ressonância <span>/ Gestão dos tempos de cada etapa</span></span>
  </div>
  <div class="top-ctrls">
    <select class="ctrl-sel" id="sel-turno">
      <option value="">Selecione o turno</option>
      <option value="Manhã">Turno Manhã</option>
      <option value="Tarde">Turno Tarde</option>
      <option value="Noite">Turno Noite</option>
    </select>
    <select class="ctrl-sel" id="sel-op" style="min-width:200px">
      <option value="">Selecione o operador</option>
    </select>
    <div class="date-chip" id="date-chip"></div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="add-zone">
      <button class="add-btn el" id="btn-el" onclick="addPat('eletivo')" disabled>
        <div class="add-dot" style="background:var(--acc)"></div>
        <span class="plus">+</span> Paciente eletivo
      </button>
      <button class="add-btn in" id="btn-in" onclick="addPat('internado')" disabled>
        <div class="add-dot" style="background:var(--teal)"></div>
        <span class="plus">+</span> Paciente internado
      </button>
    </div>
    <div class="list-head">
      <span class="list-head-title">Pacientes do turno</span>
      <span class="pat-count" id="pat-count">0</span>
    </div>
    <div class="pat-list" id="pat-list">
      <div class="empty-side">Selecione operador e turno para começar.</div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main" id="main-area"></main>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stats-left">
    <div class="stat"><span class="stat-v" id="st-total">0</span><span class="stat-l">pacientes</span></div>
    <div class="stat"><span class="stat-v" id="st-el">0</span><span class="stat-l">eletivos</span></div>
    <div class="stat"><span class="stat-v" id="st-in">0</span><span class="stat-l">internados</span></div>
    <div style="display:flex;flex-direction:column;gap:3px;margin-left:16px;justify-content:center">
      <button class="end-btn" id="btn-end" onclick="finalizarTurno()" disabled title="Preencha todos os pacientes para finalizar">
        Finalizar turno e salvar relatório
      </button>
      <div id="end-hint" style="font-size:10px;color:var(--muted);text-align:center">Complete todos os pacientes para habilitar</div>
    </div>
  </div>
  <div class="stats-right">
    <div class="spin-wrap"><div class="spin" id="spin"></div><span id="spin-lbl">Envio automático ativo</span></div>
    <div class="turno-badge" id="turno-badge">--</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
var S = { pats: [], counter: 0, activeId: null, activeZone: null };
var sendTimers = {};

// ============================================================
// INIT
// ============================================================
function init() {
  var d = new Date();
  document.getElementById('date-chip').textContent = d.toLocaleDateString('pt-BR', {weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  var opSel = document.getElementById('sel-op');
  OPERATORS.forEach(function(op) {
    var o = document.createElement('option');
    o.value = op; o.textContent = op;
    opSel.appendChild(o);
  });
  document.getElementById('sel-turno').addEventListener('change', onCtrlChange);
  document.getElementById('sel-op').addEventListener('change', onCtrlChange);
  renderMain();
}

function onCtrlChange() {
  var t = document.getElementById('sel-turno').value;
  var labels = {'Manhã':'Manhã','Tarde':'Tarde','Noite':'Noite'};
  document.getElementById('turno-badge').textContent = t ? labels[t] : '--';
  checkAddBtns();
}

function checkAddBtns() {
  var op = document.getElementById('sel-op').value;
  var tu = document.getElementById('sel-turno').value;
  var incomplete = S.pats.some(function(p) { return !isComplete(p); });
  var ok = op && tu && !incomplete;
  document.getElementById('btn-el').disabled = !ok;
  document.getElementById('btn-in').disabled = !ok;
  var allComplete = S.pats.length > 0 && S.pats.every(function(p) { return isComplete(p); });
  var endBtn = document.getElementById('btn-end');
  endBtn.disabled = !allComplete;
  endBtn.title = allComplete ? 'Finalizar e salvar relatorio no Drive' : 'Preencha todos os pacientes para finalizar';
  var hint = document.getElementById('end-hint');
  if (hint) {
    if (allComplete) {
      hint.textContent = S.pats.length + ' paciente(s) prontos para o relatorio';
      hint.style.color = 'var(--grn)';
    } else {
      var nComplete = S.pats.filter(function(p) { return isComplete(p); }).length;
      hint.textContent = nComplete + '/' + S.pats.length + ' completos';
      hint.style.color = 'var(--muted)';
    }
  }
}

function isComplete(p) {
  var hasSegs = p.segs.length > 0 || (p.livreOn && p.livreText.length > 0);
  if (!p.iniciais || !p.atend || !hasSegs || !p.agendado || !p.inicio || !p.fim) return false;
  if (p.tipo === 'eletivo' && (!p.totem || !p.cadastro)) return false;
  return true;
}

// ============================================================
// PATIENTS
// ============================================================
function addPat(tipo) {
  var id = ++S.counter;
  S.pats.push({
    id: id, tipo: tipo,
    iniciais: '', atend: '', segs: [], livreOn: false, livreText: '',
    unidade: '', unidadeOutro: false, unidadeLivre: '',
    agendado: '', totem: '', cadastro: '', inicio: '', fim: '',
    anestesia: false, poucoColab: false,
    sent: false, sending: false, sentSnap: null
  });
  S.activeId = id; S.activeZone = null;
  renderSidebar(); renderMain(); updateStats(); checkAddBtns();
}

function delPat(id) {
  S.pats = S.pats.filter(function(p) { return p.id !== id; });
  if (S.activeId === id) S.activeId = S.pats.length ? S.pats[S.pats.length-1].id : null;
  renderSidebar(); renderMain(); updateStats(); checkAddBtns();
}

function setActive(id) {
  S.activeId = id; S.activeZone = null;
  renderSidebar(); renderMain();
}

// ============================================================
// SIDEBAR
// ============================================================
function renderSidebar() {
  document.getElementById('pat-count').textContent = S.pats.length;
  var list = document.getElementById('pat-list');
  if (!S.pats.length) {
    list.innerHTML = '<div class="empty-side">Nenhum paciente registrado.</div>';
    return;
  }
  list.innerHTML = S.pats.map(function(p) {
    var done = isComplete(p);
    var active = p.id === S.activeId;
    var cls = 'pat-item' + (active ? (' active' + (p.tipo === 'internado' ? ' int' : '')) : '') + (done ? ' done' : '');
    var sentBadge = p.sent ? ' <span style="color:var(--grn);font-size:10px">enviado</span>' : '';
    return '<div class="' + cls + '" onclick="setActive(' + p.id + ')">' +
      '<div class="pat-dot ' + (p.tipo === 'eletivo' ? 'dot-el' : 'dot-in') + '"></div>' +
      '<div class="pat-info"><div class="pat-name">' + (p.iniciais || 'Novo paciente') + '</div>' +
      '<div class="pat-sub">' + (p.tipo === 'eletivo' ? 'Eletivo' : 'Internado') + (p.atend ? ' · ' + p.atend : '') + sentBadge + '</div></div>' +
      (done ? '<span class="pat-tick">&#10003;</span>' : '') + '</div>';
  }).join('');
}

// ============================================================
// MAIN FORM
// ============================================================
function renderMain() {
  var area = document.getElementById('main-area');
  var p = S.pats.find(function(x) { return x.id === S.activeId; });
  if (!p) {
    area.innerHTML = '<div class="empty-main"><svg width="56" height="56" viewBox="0 0 56 56" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="10" y="7" width="36" height="42" rx="4"/><line x1="18" y1="20" x2="38" y2="20"/><line x1="18" y1="28" x2="38" y2="28"/><line x1="18" y1="36" x2="30" y2="36"/></svg><p>Selecione ou adicione um paciente</p></div>';
    return;
  }
  var isEl = p.tipo === 'eletivo';
  var cfgWarn = (APPS_SCRIPT_URL === 'COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT') ?
    '<div class="cfg-warn">&#9888; <span>Configure <code>APPS_SCRIPT_URL</code> para ativar o envio. Veja <code>INSTRUCOES_GESTOR.txt</code>.</span></div>' : '';
  var comp = calcComp(p);
  var pCls = comp === 100 ? 'p-ok' : comp > 0 ? 'p-warn' : 'p-empty';

  var unidadeField = '';
  if (!isEl) {
    var opts = UNITS.map(function(u) {
      return '<option value="' + u + '"' + (p.unidade === u ? ' selected' : '') + '>' + u + '</option>';
    }).join('');
    unidadeField = '<div class="field s2"><label>Unidade de origem</label>' +
      '<select onchange="updUnidade(' + p.id + ',this.value)">' +
      '<option value="">Selecione...</option>' + opts +
      '<option value="__outro__"' + (p.unidadeOutro ? ' selected' : '') + '>Outro</option>' +
      '</select>' +
      (p.unidadeOutro ? '<input type="text" placeholder="Descreva a unidade..." value="' + esc(p.unidadeLivre) + '" style="margin-top:6px" oninput="updUnidadeLivre(' + p.id + ',this.value)">' : '') +
      '</div>';
  }

  var anestesiaField = '<div class="sec-block"><div class="sec-title">Observações do exame</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px">' +
    (isEl ? '' :
      '<label class="anest-label' + (p.anestesia ? ' on' : '') + '" id="anest-lbl-' + p.id + '">' +
      '<input type="checkbox"' + (p.anestesia ? ' checked' : '') + ' onchange="updAnestesia(' + p.id + ',this.checked)">' +
      '<span>Exame com anestesia</span>' +
      (p.anestesia ? '<span style="font-family:var(--mono);font-size:10px;background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);padding:2px 8px;border-radius:10px;font-weight:500">SIM</span>' : '') +
      '</label>') +
    '<label class="anest-label' + (p.poucoColab ? ' on amber' : '') + '" id="colab-lbl-' + p.id + '" style="' + (p.poucoColab ? 'border-color:rgba(180,83,9,.35);background:var(--amb-bg);color:var(--amb)' : '') + '">' +
    '<input type="checkbox"' + (p.poucoColab ? ' checked' : '') + ' onchange="updPoucoColab(' + p.id + ',this.checked)" style="accent-color:var(--amb)">' +
    '<span style="color:' + (p.poucoColab ? 'var(--amb)' : 'var(--txt2)') + '">Paciente pouco colaborativo. Necessário repetir sequências.</span>' +
    (p.poucoColab ? '<span style="font-family:var(--mono);font-size:10px;background:var(--amb-bg);color:var(--amb);border:1px solid rgba(180,83,9,.2);padding:2px 8px;border-radius:10px;font-weight:500">SIM</span>' : '') +
    '</label>' +
    '</div></div>';

  var timeFields = '';
  if (isEl) {
    timeFields = '<div class="row g3">' +
      timeField('Horário agendado', p.agendado, p.id, 'agendado') +
      timeField('Senha no Totem', p.totem, p.id, 'totem') +
      timeField('Fim do cadastro', p.cadastro, p.id, 'cadastro') +
      timeField('Início do exame', p.inicio, p.id, 'inicio') +
      timeField('Fim do exame', p.fim, p.id, 'fim') +
      '</div>';
  } else {
    timeFields = '<div class="row g3">' +
      timeField('Horário agendado', p.agendado, p.id, 'agendado') +
      timeField('Início do exame', p.inicio, p.id, 'inicio') +
      timeField('Fim do exame', p.fim, p.id, 'fim') +
      '</div>';
  }

  area.innerHTML = cfgWarn +
    '<div class="form-card">' +
    '<div class="card-head"><div class="card-head-left">' +
    '<span class="type-badge ' + (isEl ? 'badge-el' : 'badge-in') + '">' + (isEl ? 'Eletivo' : 'Internado') + '</span>' +
    '<span class="card-title">' + esc(p.iniciais || 'Novo paciente') + '</span>' +
    '</div><button class="del-btn" onclick="delPat(' + p.id + ')">Remover</button></div>' +
    '<div class="card-body">' +
    '<div class="sec-block"><div class="sec-title">Identificação</div>' +
    '<div class="row g2">' +
    '<div class="field"><label>Iniciais *</label><input type="text" placeholder="ex: J.S." maxlength="10" value="' + esc(p.iniciais) + '" oninput="upd(' + p.id + ',\'iniciais\',this.value)"></div>' +
    '<div class="field"><label>Nº Atendimento *</label><input type="text" placeholder="ex: 100001" value="' + esc(p.atend) + '" oninput="upd(' + p.id + ',\'atend\',this.value)"></div>' +
    unidadeField + '</div></div>' +
    '<div class="sec-block"><div class="sec-title">Segmentos *</div>' + buildSkel(p) + '</div>' +
    anestesiaField +
    '<div class="sec-block"><div class="sec-title">Horários *</div>' + timeFields + '</div>' +
    buildTl(p) +
    '</div>' +
    '<div class="status-bar"><div id="sbar-' + p.id + '" style="display:flex;align-items:center;gap:8px">' +
    '<span class="prog-chip ' + pCls + '">' + comp + '% preenchido</span>' +
    (isComplete(p) ? '<span class="prog-chip p-ok">&#10003; Pronto para envio</span>' : '') +
    '</div><div class="auto-send-badge"><div class="send-dot"></div> Auto-envio ativo</div></div>' +
    '</div>';

  if (S.activeZone) hlZone(S.activeZone);
}

function timeField(label, val, pid, field) {
  return '<div class="field"><label>' + label + '</label><div class="tw">' +
    '<input type="time" value="' + (val || '') + '" data-pid="' + pid + '" data-field="' + field + '" oninput="onTimeInput(this)">' +
    '<div class="tw-dot' + (val ? ' on' : '') + '"></div></div></div>';
}

function onTimeInput(el) {
  var pid = Number(el.getAttribute('data-pid'));
  var field = el.getAttribute('data-field');
  upd(pid, field, el.value);
  var dot = el.nextElementSibling;
  if (dot) dot.classList.toggle('on', !!el.value);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// SKELETON

    {id:'z-abd',  zone:'abdome',  shape:'rect', x:58,  y:184, w:84, h:54,  rx:8},
    {id:'z-col',  zone:'coluna',  shape:'rect', x:89,  y:106, w:22, h:130, rx:4},

    {id:'z-per',  zone:'pernas',  shape:'rect', x:52,  y:230, w:96, h:222, rx:8}

  var zSvg = zones.map(function(z) {

  }).join('');

  var tagHtml = p.segs.length ? '<div class="sel-tags">' + p.segs.map(function(s) {
    return '<span class="sel-tag">' + s + '<button onclick="removeSeg(' + p.id + ',\'' + s.replace(/'/g,"\\'") + '\')">&#215;</button></span>';

    // Skull
    '<ellipse class="bn" cx="100" cy="28" rx="30" ry="26"/>' +

    '<path class="bn" d="M137 362 Q139 386 138 410 Q137 415 135 416 Q139 413 142 408 Q144 384 142 362Z"/>' +
    // Ankle/foot
    '<rect class="jt" x="60" y="418" width="24" height="10" rx="4"/><rect class="jt" x="120" y="418" width="24" height="10" rx="4"/>' +
    '<rect class="bn" x="56" y="428" width="32" height="9" rx="3"/><rect class="bn" x="112" y="428" width="32" height="9" rx="3"/>' +
    // ZONES
    zSvg +
    '<text x="100" y="496" text-anchor="middle" style="font-size:9px;fill:#8a91a8;font-family:DM Sans,sans-serif" id="lbl-hint">clique em uma região</text>' +
    '</svg></div>' +
    '<div class="exam-panel" id="ep-' + p.id + '">' + panelContent + tagHtml + livreTog + '</div>' +
    '</div>';
}

function hlZone(zone) {
  document.querySelectorAll('.sz').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('[id^="z-"]').forEach(function(el) {
    var key = el.id.replace('z-', '');
    var zoneMap = {cab:'cabeca',tor:'torax',abd:'abdome',col:'coluna',brl:'bracos',brr:'bracos',per:'pernas'};
    if (zoneMap[key] === zone) el.classList.add('active');
  });
  var lbl = document.getElementById('lbl-hint');
  if (lbl) lbl.textContent = EXAMS[zone] ? EXAMS[zone].label : '';
}

function buildExamList(p, zone) {
  if (!EXAMS[zone]) return '';
  return '<div class="exam-region">' + EXAMS[zone].label + '</div>' +
    '<div class="exam-list">' + EXAMS[zone].list.map(function(ex) {
      var isSel = p.segs.indexOf(ex) !== -1;
      return '<div class="exam-chip' + (isSel ? ' sel' : '') + '" onclick="togExam(' + p.id + ',\'' + ex.replace(/'/g,"\\'") + '\',\'' + zone + '\')">' + ex + '</div>';
    }).join('') + '</div>';
}

function selZone(zone) {
  S.activeZone = zone;
  var p = S.pats.find(function(x) { return x.id === S.activeId; });
  if (!p) return;
  hlZone(zone);
  var ep = document.getElementById('ep-' + p.id);
  if (!ep) return;
  var tagHtml = p.segs.length ? '<div class="sel-tags">' + p.segs.map(function(s) {
    return '<span class="sel-tag">' + s + '<button onclick="removeSeg(' + p.id + ',\'' + s.replace(/'/g,"\\'") + '\')">&#215;</button></span>';
  }).join('') + '</div>' : '';
  var livreTog = '<div class="livre-block"><label class="livre-toggle' + (p.livreOn ? ' on' : '') + '" id="livre-lbl-' + p.id + '">' +
    '<input type="checkbox"' + (p.livreOn ? ' checked' : '') + ' onchange="togLivre(' + p.id + ',this.checked)">' +
    '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0"><circle cx="7" cy="7" r="6"/><line x1="7" y1="4" x2="7" y2="10"/><line x1="4" y1="7" x2="10" y2="7"/></svg>' +
    'Exame não encontrado na lista</label>' +
    '<div class="livre-area' + (p.livreOn ? ' show' : '') + '" id="livre-area-' + p.id + '">' +
    '<textarea id="livre-txt-' + p.id + '" placeholder="Digite o nome completo do exame..." oninput="updLivre(' + p.id + ',this.value)">' + esc(p.livreText) + '</textarea>' +
    '<div class="livre-hint">Este texto será enviado como segmento para a planilha.</div></div></div>';
  ep.innerHTML = buildExamList(p, zone) + tagHtml + livreTog;
}

function togExam(id, exam, zone) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  var idx = p.segs.indexOf(exam);
  if (idx === -1) p.segs.push(exam); else p.segs.splice(idx, 1);
  selZone(zone); refreshStatus(p); schedSend(p);
}

function removeSeg(id, exam) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.segs = p.segs.filter(function(s) { return s !== exam; });
  if (S.activeZone) selZone(S.activeZone);
  refreshStatus(p); checkAddBtns(); schedSend(p);
}

function togLivre(id, checked) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.livreOn = checked;
  if (!checked) p.livreText = '';
  var lbl = document.getElementById('livre-lbl-' + id);
  var area = document.getElementById('livre-area-' + id);
  var txt = document.getElementById('livre-txt-' + id);
  if (lbl) lbl.classList.toggle('on', checked);
  if (area) area.classList.toggle('show', checked);
  if (txt && !checked) txt.value = '';
  refreshStatus(p); schedSend(p);
}

function updLivre(id, val) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.livreText = val.trim();
  refreshStatus(p); schedSend(p);
}

// ============================================================
// FIELD UPDATES
// ============================================================
function upd(id, field, val) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p[field] = val;
  if (field === 'iniciais') {
    var t = document.querySelector('.card-title');
    if (t) t.textContent = val || 'Novo paciente';
    renderSidebar();
  }
  if (field === 'atend') renderSidebar();
  refreshStatus(p); refreshTl(p); schedSend(p);
}

function updUnidade(id, val) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  if (val === '__outro__') {
    p.unidadeOutro = true; p.unidade = '';
  } else {
    p.unidadeOutro = false; p.unidadeLivre = ''; p.unidade = val;
  }
  renderMain(); schedSend(p);
}

function updUnidadeLivre(id, val) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.unidadeLivre = val.trim(); p.unidade = val.trim();
  refreshStatus(p); schedSend(p);
}

function updAnestesia(id, checked) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.anestesia = checked;
  var lbl = document.getElementById('anest-lbl-' + id);
  if (lbl) {
    lbl.classList.toggle('on', checked);
    lbl.style.borderColor = checked ? 'rgba(192,57,43,.35)' : '';
    lbl.style.background = checked ? 'var(--red-bg)' : '';
    lbl.style.color = checked ? 'var(--red)' : '';
    var badge = lbl.querySelector('.anest-badge');
    if (checked && !badge) {
      var b = document.createElement('span');
      b.className = 'anest-badge';
      b.style.cssText = 'font-family:var(--mono);font-size:10px;background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);padding:2px 8px;border-radius:10px;font-weight:500';
      b.textContent = 'SIM';
      lbl.appendChild(b);
    } else if (!checked && badge) { badge.remove(); }
  }
  refreshStatus(p); schedSend(p);
}

function updPoucoColab(id, checked) {
  var p = S.pats.find(function(x) { return x.id === id; });
  if (!p) return;
  p.poucoColab = checked;
  var lbl = document.getElementById('colab-lbl-' + id);
  if (lbl) {
    lbl.style.borderColor = checked ? 'rgba(180,83,9,.35)' : '';
    lbl.style.background = checked ? 'var(--amb-bg)' : '';
    lbl.style.color = checked ? 'var(--amb)' : '';
    var sp = lbl.querySelector('span');
    if (sp) sp.style.color = checked ? 'var(--amb)' : 'var(--txt2)';
    var badge = lbl.querySelector('.colab-badge');
    if (checked && !badge) {
      var b = document.createElement('span');
      b.className = 'colab-badge';
      b.style.cssText = 'font-family:var(--mono);font-size:10px;background:var(--amb-bg);color:var(--amb);border:1px solid rgba(180,83,9,.2);padding:2px 8px;border-radius:10px;font-weight:500;flex-shrink:0';
      b.textContent = 'SIM';
      lbl.appendChild(b);
    } else if (!checked && badge) { badge.remove(); }
  }
  schedSend(p);
}

function refreshStatus(p) {
  var bar = document.getElementById('sbar-' + p.id);
  if (!bar) return;
  var c = calcComp(p);
  var cls = c === 100 ? 'p-ok' : c > 0 ? 'p-warn' : 'p-empty';
  bar.innerHTML = '<span class="prog-chip ' + cls + '">' + c + '% preenchido</span>' +
    (isComplete(p) ? '<span class="prog-chip p-ok">&#10003; Pronto</span>' : '');
  checkAddBtns();
}

function refreshTl(p) {
  var tl = document.querySelector('.tl-bar');
  if (tl) tl.outerHTML = buildTl(p);
}

function calcComp(p) {
  var fields = p.tipo === 'eletivo' ? ['iniciais','atend','agendado','totem','cadastro','inicio','fim'] : ['iniciais','atend','agendado','inicio','fim'];
  var filled = fields.filter(function(f) { return p[f]; }).length;
  var hasSegs = (p.segs.length > 0 || (p.livreOn && p.livreText.length > 0)) ? 1 : 0;
  return Math.round((filled + hasSegs) / (fields.length + 1) * 100);
}

function buildTl(p) {
  var steps = p.tipo === 'eletivo'
    ? [{l:'Agendado',v:p.agendado},{l:'Totem',v:p.totem},{l:'Cadastro',v:p.cadastro},{l:'Início',v:p.inicio},{l:'Fim',v:p.fim}]
    : [{l:'Agendado',v:p.agendado},{l:'Início',v:p.inicio},{l:'Fim',v:p.fim}];
  var inner = steps.map(function(s, i) {
    var done = !!s.v;
    var next = !done && (i === 0 || steps[i-1].v);
    var dc = done ? 'done' : next ? 'next' : '';
    var lc = (done && i < steps.length - 1) ? 'done' : '';
    return '<div class="tl-step"><div class="tl-inner"><div class="tl-dot ' + dc + '">' + (done ? '&#10003;' : i+1) + '</div><div class="tl-lbl">' + s.l + '</div>' + (s.v ? '<div class="tl-tm">' + s.v + '</div>' : '') + '</div>' + (i < steps.length - 1 ? '<div class="tl-ln ' + lc + '"></div>' : '') + '</div>';
  }).join('');
  return '<div class="tl-bar"><div class="tl-title">Linha do tempo</div><div class="tl-track">' + inner + '</div></div>';
}

function updateStats() {
  document.getElementById('st-total').textContent = S.pats.length;
  document.getElementById('st-el').textContent = S.pats.filter(function(p) { return p.tipo === 'eletivo'; }).length;
  document.getElementById('st-in').textContent = S.pats.filter(function(p) { return p.tipo === 'internado'; }).length;
}

// ============================================================
// AUTO-SEND — bulletproof: snapshot comparison, single in-flight guard
// ============================================================
function snap(p) {
  return JSON.stringify([p.tipo, p.iniciais, p.atend, p.unidade, p.unidadeLivre,
    p.segs.slice().sort(), p.livreOn, p.livreText, p.anestesia, p.poucoColab,
    p.agendado, p.totem, p.cadastro, p.inicio, p.fim]);
}

function schedSend(p) {
  if (!isComplete(p)) return;
  if (p.sending) return;
  clearTimeout(sendTimers[p.id]);
  sendTimers[p.id] = setTimeout(function() { doSend(p); }, 900);
}

function doSend(p) {
  if (p.sending) return;
  var op = document.getElementById('sel-op').value;
  var tu = document.getElementById('sel-turno').value;
  if (!op || !tu) { toast('Selecione operador e turno antes de enviar.', 'inf'); return; }
  if (!isComplete(p)) return;

  var currentSnap = snap(p);
  if (p.sent && p.sentSnap === currentSnap) return; // nothing changed

  p.sending = true;
  var isUpdate = p.sent;
  setSpin(true, isUpdate ? 'Atualizando...' : 'Enviando...');

  var segsVal = (p.livreOn && p.livreText) ? p.livreText : p.segs.join(' | ');
  var payload = {
    data: new Date().toLocaleDateString('pt-BR'),
    hora_envio: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
    acao: isUpdate ? 'update' : 'insert',
    turno: tu, operador: op, id_paciente: p.id,
    pacientes: [{
      tipo: p.tipo, iniciais: p.iniciais, atendimento: p.atend,
      unidade: p.unidade, segmentos: segsVal,
      anestesia: p.tipo === 'internado' ? (p.anestesia ? 'Sim' : 'Nao') : '',
      poucoColab: p.poucoColab ? 'Sim' : 'Nao',
      agendado: p.agendado, totem: p.totem, cadastro: p.cadastro,
      inicio: p.inicio, fim: p.fim
    }]
  };

  if (APPS_SCRIPT_URL === 'COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT') {
    // Demo mode
    setTimeout(function() { finishSend(p, currentSnap, isUpdate); }, 800);
    return;
  }

  var xhr = new XMLHttpRequest();
  xhr.open('POST', APPS_SCRIPT_URL, true);
  xhr.setRequestHeader('Content-Type', 'text/plain'); // avoid preflight
  xhr.onload = function() { finishSend(p, currentSnap, isUpdate); };
  xhr.onerror = function() {
    p.sending = false;
    setSpin(false, 'Envio automático ativo');
    toast('Erro ao enviar. Verifique a conexao.', 'err');
  };
  xhr.send(JSON.stringify(payload));
}

function finishSend(p, currentSnap, wasUpdate) {
  p.sent = true; p.sending = false; p.sentSnap = currentSnap;
  setSpin(false, 'Envio automático ativo');
  renderSidebar(); checkAddBtns();
  toast((wasUpdate ? 'Atualizado: ' : 'Registrado: ') + (p.iniciais || 'Paciente'), 'ok');
  // If data changed during send, re-queue
  var newSnap = snap(p);
  if (newSnap !== currentSnap && isComplete(p)) schedSend(p);
}

function setSpin(on, msg) {
  var spin = document.getElementById('spin');
  var lbl = document.getElementById('spin-lbl');
  if (spin) spin.classList.toggle('on', on);
  if (lbl) lbl.textContent = msg;
}

// ============================================================
// TOAST
// ============================================================
var toastTimer;
function toast(msg, type) {
  type = type || 'inf';
  var el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3500);
}

// ============================================================
// FINALIZAR TURNO - envia relatorio PDF para o Drive
// ============================================================
function finalizarTurno() {
  var op = document.getElementById('sel-op').value;
  var tu = document.getElementById('sel-turno').value;
  if (!op || !tu) { toast('Selecione operador e turno.', 'err'); return; }
  var complete = S.pats.filter(function(p) { return isComplete(p); });
  if (!complete.length) { toast('Preencha ao menos um paciente completamente.', 'err'); return; }

  var pdf = buildPdfHtml(complete, op, tu);

  if (APPS_SCRIPT_URL === 'COLE_AQUI_A_URL_DO_SEU_APPS_SCRIPT') {
    // Demo: open in new window
    var win = window.open('', '_blank');
    win.document.write(pdf);
    win.document.close();
    toast('Modo demo: relatório aberto em nova aba.', 'inf');
    return;
  }

  setSpin(true, 'Gerando relatório...');
  var payload = {
    acao: 'relatorio',
    turno: tu, operador: op,
    data: new Date().toLocaleDateString('pt-BR'),
    html: pdf
  };
  var xhr = new XMLHttpRequest();
  xhr.open('POST', APPS_SCRIPT_URL, true);
  xhr.setRequestHeader('Content-Type', 'text/plain');
  xhr.onload = function() {
    setSpin(false, 'Envio automático ativo');
    try {
      var resp = JSON.parse(xhr.responseText);
      if (resp.status === 'ok') toast('Relatório salvo no Google Drive!', 'ok');
      else toast('Relatório enviado.', 'ok');
    } catch(e) { toast('Relatório enviado.', 'ok'); }
  };
  xhr.onerror = function() {
    setSpin(false, 'Envio automático ativo');
    toast('Erro ao salvar relatório. Verifique a conexao.', 'err');
  };
  xhr.send(JSON.stringify(payload));
}

function buildPdfHtml(pats, op, tu) {
  var d = new Date().toLocaleDateString('pt-BR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  var rows = pats.map(function(p, i) {
    var segs = (p.livreOn && p.livreText) ? p.livreText : p.segs.join(', ');
    return '<tr>' +
      '<td>' + (i+1) + '</td>' +
      '<td>' + (p.iniciais || '') + '</td>' +
      '<td>' + (p.atend || '') + '</td>' +
      '<td>' + (p.tipo === 'eletivo' ? 'Eletivo' : 'Internado') + '</td>' +
      '<td>' + (p.tipo === 'internado' ? (p.unidade || '') : '') + '</td>' +
      '<td style="font-size:10px">' + segs + '</td>' +
      '<td>' + (p.tipo === 'internado' ? (p.anestesia ? 'Sim' : 'Nao') : '') + '</td>' +
      '<td>' + (p.poucoColab ? 'Sim' : '') + '</td>' +
      '<td>' + (p.agendado || '') + '</td>' +
      (p.tipo === 'eletivo' ? '<td>' + (p.totem || '') + '</td><td>' + (p.cadastro || '') + '</td>' : '<td colspan="2"></td>') +
      '<td>' + (p.inicio || '') + '</td>' +
      '<td>' + (p.fim || '') + '</td>' +
      '</tr>';
  }).join('');

  return '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">' +
    '<style>body{font-family:Arial,sans-serif;font-size:12px;color:#1a1d26;margin:20px}' +
    'h1{font-size:16px;margin-bottom:4px}h2{font-size:12px;font-weight:400;color:#666;margin-bottom:16px}' +
    'table{border-collapse:collapse;width:100%}th{background:#1e56c8;color:#fff;padding:7px 8px;font-size:10px;text-align:left}' +
    'td{padding:6px 8px;border-bottom:1px solid #dde1e9;font-size:11px;vertical-align:top}' +
    'tr:nth-child(even) td{background:#f4f5f7}' +
    '.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600}' +
    '.el{background:#e8eefb;color:#1e56c8}.in{background:#e4f5f1;color:#0e8a72}' +
    '.footer{margin-top:20px;font-size:10px;color:#8a91a8;border-top:1px solid #dde1e9;padding-top:10px}' +
    '@media print{body{margin:0}}</style></head><body>' +
    '<h1>Relatório de Plantão - Ressonância Magnética</h1>' +
    '<h2>' + d + ' &nbsp;|&nbsp; Turno: ' + tu + ' &nbsp;|&nbsp; Operador: ' + op + ' &nbsp;|&nbsp; Total: ' + pats.length + ' pacientes</h2>' +
    '<table><thead><tr>' +
    '<th>#</th><th>Iniciais</th><th>Atend.</th><th>Tipo</th><th>Unidade</th><th>Segmentos</th>' +
    '<th>Anest.</th><th>Pouco colab.</th><th>Agendado</th><th>Totem</th><th>Cadastro</th><th>Início</th><th>Fim</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '<div class="footer">Gerado automaticamente pelo sistema de Gestão de Plantão RM em ' + new Date().toLocaleString('pt-BR') + '</div>' +
    '</body></html>';
}

// START
init();
</script>
</body>
</html>
